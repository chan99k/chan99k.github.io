[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  external_node_modules = ["@huggingface/transformers", "onnxruntime-node", "onnxruntime-common"]
  node_bundler = "esbuild"

# Redirect SPA fallback for admin page
[[redirects]]
  from = "/admin/*"
  to = "/admin/index.html"
  status = 200
