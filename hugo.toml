# 기본 사이트 설정
baseURL = 'https://chan99k.github.io/'  # 배포될 사이트의 기본 URL
languageCode = 'ko'                     # 사이트의 언어 코드 (한국어)
title = "chan99k's"                     # 사이트의 제목
theme = 'PaperMod'                      # 사용할 Hugo 테마

# Hugo 빌드 설정
enableRobotsTXT = true                  # robots.txt 파일 자동 생성 활성화
buildDrafts = false                     # 초안(draft) 페이지 빌드 제외
buildFuture = false                     # 미래 날짜의 게시물 빌드 제외
buildExpired = false                    # 만료된 게시물 빌드 제외

# 최적화 설정
[minify]
  disableXML = true                     # XML 파일 압축 비활성화
  minifyOutput = true                   # HTML/CSS/JS 파일 압축 활성화

# 사이트 파라미터 설정
[params]
  env = "production"                    # 환경 설정 (production/development)
  title = "chan99k's"                   # 메타 태그에 사용될 제목
  description = "chan99k's blog"        # 사이트 설명 (SEO 메타 태그)
  keywords = ["Backend", "Java", "Spring", "Developer", "Portfolio"]  # SEO 키워드
  author = "chan99k"                    # 작성자 정보
  DateFormat = "2006-01-02"             # 날짜 표시 형식 (YYYY-MM-DD)
  defaultTheme = "auto"                 # 기본 테마 (auto/light/dark)
  disableThemeToggle = false            # 테마 전환 버튼 표시 여부

  # 게시물 표시 옵션
  ShowReadingTime = false               # 읽기 시간 표시 (비활성화)
  ShowShareButtons = false              # 공유 버튼 표시 (비활성화)
  ShowPostNavLinks = true               # 이전/다음 게시물 링크 표시
  ShowBreadCrumbs = true                # 브레드크럼 네비게이션 표시
  ShowCodeCopyButtons = false           # 코드 복사 버튼 표시 (비활성화)
  ShowWordCount = false                 # 단어 수 표시 (비활성화)
  ShowRssButtonInSectionTermList = true # 섹션별 RSS 버튼 표시
  UseHugoToc = true                     # Hugo 내장 목차 사용
  disableSpecial1stPost = false         # 첫 번째 게시물 특별 표시 비활성화
  disableScrollToTop = false            # 맨 위로 스크롤 버튼 활성화
  comments = false                      # 댓글 기능 비활성화
  hidemeta = true                       # 메타 정보 표시 (날짜, 작성자 등 숨김)
  hideSummary = false                   # 요약 표시
  showtoc = false                       # 목차 표시 (기본값)
  tocopen = false                       # 목차 펼침 상태 (기본값)

  # 프로필 모드 설정 (홈페이지 레이아웃)
  [params.profileMode]
    enabled = true                      # 프로필 모드 활성화
    title = "chan99k's"                 # 프로필 제목
    subtitle = "Portfolios & Posts"     # 프로필 부제목
    imageUrl = ""                       # 프로필 이미지 URL (비어있음)
    imageWidth = 120                    # 프로필 이미지 너비
    imageHeight = 120                   # 프로필 이미지 높이
    imageTitle = "chan99k"              # 프로필 이미지 alt 텍스트
    
    # 프로필 페이지 버튼 설정
    [[params.profileMode.buttons]]
      name = "Posts"                    # 버튼 이름
      url = "posts"                     # 버튼 링크
    [[params.profileMode.buttons]]
      name = "Portfolio"                # 버튼 이름
      url = "portfolio"                 # 버튼 링크

  # 소셜 아이콘 설정
  [[params.socialIcons]]
    name = "github"                     # 아이콘 타입 (GitHub)
    url = "https://github.com/chan99k"  # GitHub 프로필 URL
  [[params.socialIcons]]
    name = "email"                      # 아이콘 타입 (이메일)
    url = "mailto:kjkj5868@gmail.com"   # 이메일 주소

# 분류체계 설정 (태그, 카테고리 등)
[taxonomies]
  category = "categories"               # 카테고리 분류
  tag = "tags"                          # 태그 분류
  series = "series"                     # 시리즈 분류

# 마크다운 렌더링 설정
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true                     # HTML 태그 허용 (보안 주의)
  [markup.highlight]
    lineNos = true                      # 코드 블록 줄 번호 표시
    noClasses = false                   # CSS 클래스 사용
    style = 'github'                    # 코드 하이라이트 스타일

# 메뉴 설정 (상단 네비게이션)
[menu]
  [[menu.main]]
    identifier = "portfolio"            # 메뉴 식별자
    name = "Portfolio"                  # 메뉴 표시 이름
    url = "/portfolio/"                 # 메뉴 링크 URL
    weight = 10                         # 메뉴 순서 (낮을수록 앞)
    
  [[menu.main]]
    identifier = "posts"                # 메뉴 식별자
    name = "Posts"                      # 메뉴 표시 이름
    url = "/posts/"                     # 메뉴 링크 URL
    weight = 20                         # 메뉴 순서
    
  [[menu.main]]
    identifier = "aboutme"              # 메뉴 식별자
    name = "About Me"                   # 메뉴 표시 이름
    url = "/about/"                     # 메뉴 링크 URL
    weight = 30                         # 메뉴 순서
